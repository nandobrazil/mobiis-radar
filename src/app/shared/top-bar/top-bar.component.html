<header
  class="relative z-20 flex h-16 shrink-0 items-center gap-2 border-b border-border bg-background/90 px-3 backdrop-blur-xl supports-[backdrop-filter]:bg-background/75 md:gap-3 md:px-6"
>
  <button
    type="button"
    class="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-border bg-card text-muted-foreground transition-colors hover:bg-muted md:hidden"
    (click)="menu.open.set(true)"
    aria-label="Abrir menu"
  >
    <app-icon [icon]="iconMenu" size="20" strokeWidth="2" svgClass="size-5 shrink-0" />
  </button>

  <div class="min-w-0 flex-1">
    <h1 class="truncate text-sm font-semibold leading-tight tracking-tight">{{ title() }}</h1>
    @if (subtitle(); as sub) {
      <p class="mt-0.5 line-clamp-2 text-xs leading-snug text-muted-foreground">{{ sub }}</p>
    }
  </div>

  <div class="flex shrink-0 items-center gap-1.5 md:gap-2">
    <!-- <div class="relative hidden md:block">
      <app-icon
        [icon]="iconSearch"
        size="16"
        strokeWidth="2"
        svgClass="pointer-events-none absolute left-3 top-1/2 z-[1] size-4 -translate-y-1/2 text-muted-foreground"
      />
      <input
        type="search"
        autocomplete="off"
        placeholder="Buscar clientes, segmentos, produtos..."
        class="h-9 w-[min(20rem,calc(100vw-24rem))] rounded-lg border border-border/60 bg-card py-0 pl-9 pr-[4.25rem] text-sm text-foreground outline-none ring-ring/0 transition placeholder:text-muted-foreground/80 focus:border-ring focus:ring-2 focus:ring-ring/30"
      />
      <kbd
        class="pointer-events-none absolute right-2 top-1/2 hidden -translate-y-1/2 select-none rounded border border-border bg-muted px-1.5 py-0.5 text-[10px] font-medium text-muted-foreground sm:inline-block"
      >
        ⌘ K
      </kbd>
    </div> -->
    <button
      type="button"
      class="grid h-9 w-9 shrink-0 place-items-center rounded-lg border border-border bg-card text-muted-foreground transition-colors hover:bg-muted"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.dark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
      [attr.title]="theme.dark() ? 'Modo claro' : 'Modo escuro'"
    >
      @if (theme.dark()) {
        <app-icon [icon]="iconSun" size="18" strokeWidth="2" svgClass="size-[18px]" />
      } @else {
        <app-icon [icon]="iconMoon" size="18" strokeWidth="2" svgClass="size-[18px]" />
      }
    </button>
    <!-- <button
      type="button"

      aria-label="Notificações"
    >
      <app-icon [icon]="iconBell" size="18" strokeWidth="2" svgClass="size-[18px]" />
      <span
        class="absolute -right-0.5 -top-0.5 grid h-4 min-w-[1rem] place-items-center rounded-full bg-destructive px-1 text-[10px] font-medium leading-none text-destructive-foreground"
      >
        3
      </span>
    </button> -->
  </div>
</header>
