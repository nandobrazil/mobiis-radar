<div
  class="group h-full relative overflow-hidden rounded-2xl border border-foreground/10 bg-card p-5 shadow-card transition-all hover:border-primary/45 hover:shadow-elegant dark:border-foreground/14"
>
  <div
    class="pointer-events-none absolute inset-x-0 top-0 h-24 bg-gradient-to-b to-transparent"
    [class]="toneGradientClass()"
  ></div>
  <div class="relative flex items-start justify-between">
    <div>
      <p class="text-[11px] font-semibold uppercase tracking-wider text-card-foreground/78">{{ label() }}</p>
      <p class="mt-2 text-3xl font-bold tabular-nums tracking-tight text-card-foreground">{{ value() }}</p>
      @if (hint()) {
        <p class="mt-1 text-xs leading-snug text-card-foreground/68">{{ hint() }}</p>
      }
    </div>
    <div
      class="grid h-10 w-10 shrink-0 place-items-center rounded-xl border shadow-sm"
      [class]="toneIconClass()"
    >
      <app-icon [icon]="icon()" size="22" strokeWidth="2.25" svgClass="shrink-0" />
    </div>
  </div>
  @if (delta() !== undefined) {
    <div class="relative mt-4 flex items-center gap-1.5 text-xs">
      <span
        class="inline-flex items-center gap-0.5 rounded-md px-1.5 py-0.5 font-medium"
        [class]="positive() ? 'bg-success/15 text-success' : 'bg-destructive/15 text-destructive'"
      >
        @if (positive()) {
          <app-icon [icon]="trendUp" size="14" strokeWidth="2.5" svgClass="size-3.5 shrink-0" />
        } @else {
          <app-icon [icon]="trendDown" size="14" strokeWidth="2.5" svgClass="size-3.5 shrink-0" />
        }
        {{ absDelta() }}%
      </span>
      <span class="text-card-foreground/65">vs periodo anterior</span>
    </div>
  }
</div>
