<div class="page-shell">
  <app-top-bar title="Clientes" [subtitle]="subtitle()" />
  <main class="page-shell-body space-y-6 p-4 md:p-6">
  <app-relatorio-processamento-banner />

  @if (relatorio.error(); as msg) {
    <div class="rounded-lg border border-destructive/40 bg-destructive/10 px-4 py-3 text-sm text-destructive">
      {{ msg }}
      <button type="button" class="ml-3 underline" (click)="relatorio.load()">Tentar novamente</button>
    </div>
  }

  <section class="grid grid-cols-2 gap-4 md:grid-cols-2">
    @if (relatorio.loading() && !relatorio.error()) {
      @for (i of kpiSkeletonSlots; track i) {
        <app-kpi-card-skeleton />
      }
    } @else {
      <app-kpi-card
        label="Total de clientes"
        [value]="stats().total"
        [icon]="iconUsers"
        tone="primary"
        [hint]="stats().semAnalise ? stats().comAnalise + ' com IA · ' + stats().semAnalise + ' sem IA' : 'Todos com análise IA'"
      />
      <app-kpi-card label="Risco alto" [value]="stats().alto" [icon]="iconAlertHigh" tone="danger" [hint]="pct(stats().alto)" />
    }
  </section>

  <div class="space-y-4">
    <!-- FILTROS GLOBAIS -->
    <div class="flex flex-col gap-3 sm:flex-row sm:flex-wrap sm:items-center">
      <div class="relative min-w-0 flex-1 basis-[min(100%,16rem)]">
        <app-icon
          [icon]="iconSearch"
          size="16"
          strokeWidth="2"
          svgClass="pointer-events-none absolute left-3 top-1/2 size-4 -translate-y-1/2 text-muted-foreground"
        />
        <input
          [value]="q()"
          (input)="q.set($any($event.target).value)"
          placeholder="Buscar cliente..."
          class="h-10 w-full rounded-lg border border-border bg-background pl-9 text-sm outline-none focus:ring-2 focus:ring-ring"
        />
      </div>
      <ng-select
        class="filter-ng-select w-full shrink-0 sm:w-[11.5rem] rounded-sm"
        [items]="riskFilterOptions"
        bindLabel="label"
        bindValue="value"
        [clearable]="risk() !== ALL"
        [searchable]="false"
        appendTo="body"
        [ngModel]="risk()"
        placeholder="Risco..."
        (ngModelChange)="onRiskFilterChange($event)"
        aria-label="Filtrar por nível de risco"
        [class.outline]="risk() !== ALL"
        [class.outline-primary]="risk() !== ALL"
        [class.outline-2]="risk() !== ALL"
      />
      <ng-select
        class="filter-ng-select w-full shrink-0 sm:w-[15rem] rounded-sm"
        [items]="cnaeOptions()"
        bindLabel="label"
        bindValue="value"
        [clearable]="cnae() !== ALL"
        [searchable]="true"
        appendTo="body"
        [ngModel]="cnae()"
        (ngModelChange)="onCnaeFilterChange($event)"
        aria-label="Filtrar por segmento"
        placeholder="Segmento..."
        [class.outline]="cnae() !== ALL"
        [class.outline-primary]="cnae() !== ALL"
        [class.outline-2]="cnae() !== ALL"
      />
      <ng-select
        class="filter-ng-select w-full shrink-0 sm:w-[12rem] rounded-sm"
        [items]="perfilOptions()"
        bindLabel="label"
        bindValue="value"
        [clearable]="perfil() !== ALL"
        [searchable]="true"
        appendTo="body"
        [ngModel]="perfil()"
        (ngModelChange)="onPerfilFilterChange($event)"
        aria-label="Filtrar por perfil de uso"
        placeholder="Perfil..."
        [class.outline]="perfil() !== ALL"
        [class.outline-primary]="perfil() !== ALL"
        [class.outline-2]="perfil() !== ALL"
      />
      <div class="flex w-full flex-wrap gap-2 sm:ml-auto sm:w-auto">
        <button
          type="button"
          class="btn-outline w-full shrink-0 sm:w-auto"
          [disabled]="relatorio.loading()"
          (click)="relatorio.load()"
        >
          {{ relatorio.loading() ? 'Atualizando...' : 'Atualizar' }}
        </button>
      </div>
    </div>

    <!-- ABAS -->
    <div class="flex items-center gap-1 rounded-xl bg-muted/20 p-1 w-fit">
      <button
        (click)="setTab('list')"
        class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
        [class.bg-card]="activeTab() === 'list'"
        [class.shadow-sm]="activeTab() === 'list'"
        [class.text-primary]="activeTab() === 'list'"
        [class.text-muted-foreground]="activeTab() !== 'list'"
      >
        Lista de clientes
      </button>
      <button
        (click)="setTab('segments')"
        class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
        [class.bg-card]="activeTab() === 'segments'"
        [class.shadow-sm]="activeTab() === 'segments'"
        [class.text-primary]="activeTab() === 'segments'"
        [class.text-muted-foreground]="activeTab() !== 'segments'"
      >
        Segmentos
      </button>
      <button
        (click)="setTab('map')"
        class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
        [class.bg-card]="activeTab() === 'map'"
        [class.shadow-sm]="activeTab() === 'map'"
        [class.text-primary]="activeTab() === 'map'"
        [class.text-muted-foreground]="activeTab() !== 'map'"
      >
        Mapa
      </button>
    </div>

    <div class="mt-4">
      @switch (activeTab()) {
        @case ('list') {
          <app-radar-list [data]="filtered()" [loading]="relatorio.loading()" />
        }
        @case ('segments') {
          <app-radar-segments [data]="filtered()" [loading]="relatorio.loading()" (segmentClick)="selectSegment($event)" />
        }
        @case ('map') {
          <app-radar-map [data]="filtered()" />
        }
      }
    </div>
  </div>

  </main>
</div>
