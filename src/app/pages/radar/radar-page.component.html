<div class="page-shell">
  <app-top-bar title="Clientes" [subtitle]="subtitle()" />
  <main class="page-shell-body space-y-4 p-4 md:p-6">
  @if (relatorio.error(); as msg) {
    <div class="rounded-lg border border-destructive/40 bg-destructive/10 px-4 py-3 text-sm text-destructive">
      {{ msg }}
      <button type="button" class="ml-3 underline" (click)="relatorio.load()">Tentar novamente</button>
    </div>
  }
  <section class="grid grid-cols-2 gap-4 md:grid-cols-2">
    @if (relatorio.loading() && !relatorio.error()) {
      @for (i of kpiSkeletonSlots; track i) {
        <app-kpi-card-skeleton />
      }
    } @else {
      <app-kpi-card
        label="Total de clientes"
        [value]="stats().total"
        [icon]="iconUsers"
        tone="primary"
        [hint]="stats().semAnalise ? stats().comAnalise + ' com IA · ' + stats().semAnalise + ' sem IA' : 'Todos com análise IA'"
      />
      <app-kpi-card label="Risco alto" [value]="stats().alto" [icon]="iconAlertHigh" tone="danger" [hint]="pct(stats().alto)" />
    }
  </section>

  <!-- ABAS -->
  <div class="flex items-center gap-1 rounded-xl bg-muted/20 p-1 w-fit">
    <button
      (click)="setTab('list')"
      class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
      [class.bg-card]="activeTab() === 'list'"
      [class.shadow-sm]="activeTab() === 'list'"
      [class.text-primary]="activeTab() === 'list'"
      [class.text-muted-foreground]="activeTab() !== 'list'"
    >
      Lista de clientes
    </button>
    <button
      (click)="setTab('segments')"
      class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
      [class.bg-card]="activeTab() === 'segments'"
      [class.shadow-sm]="activeTab() === 'segments'"
      [class.text-primary]="activeTab() === 'segments'"
      [class.text-muted-foreground]="activeTab() !== 'segments'"
    >
      Segmentos
    </button>
    <button
      (click)="setTab('map')"
      class="px-4 py-2 text-sm font-medium rounded-lg transition-all"
      [class.bg-card]="activeTab() === 'map'"
      [class.shadow-sm]="activeTab() === 'map'"
      [class.text-primary]="activeTab() === 'map'"
      [class.text-muted-foreground]="activeTab() !== 'map'"
    >
      Mapa
    </button>
  </div>

  <div class="mt-4">
    @switch (activeTab()) {
      @case ('list') {
        <app-radar-list />
      }
      @case ('segments') {
        <app-radar-segments />
      }
      @case ('map') {
        <app-radar-map />
      }
    }
  </div>

  </main>
</div>
